<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>File Converter — MKV to MP4</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>File Converter</h1>
        <p class="subtitle">MKV → MP4 · runs locally in your browser</p>
      </header>

      <section id="dropzone" class="dropzone" tabindex="0">
        <input id="file-input" type="file" accept=".mkv,video/x-matroska" hidden />
        <div class="dropzone-content">
          <svg viewBox="0 0 24 24" width="48" height="48" aria-hidden="true">
            <path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v9.59l3.3-3.3a1 1 0 1 1 1.4 1.42l-5 5a1 1 0 0 1-1.4 0l-5-5a1 1 0 1 1 1.4-1.42L11 13.59V4a1 1 0 0 1 1-1Zm-7 15a1 1 0 0 1 1 1v1h12v-1a1 1 0 1 1 2 0v2a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1Z"/>
          </svg>
          <p><strong>Drop an MKV file here</strong></p>
          <p class="hint">or click to choose</p>
        </div>
      </section>

      <section id="file-info" class="file-info hidden">
        <div class="row">
          <span class="label">File</span>
          <span id="file-name" class="value"></span>
        </div>
        <div class="row">
          <span class="label">Size</span>
          <span id="file-size" class="value"></span>
        </div>
        <button id="convert-btn" class="primary" disabled>Convert to MP4</button>
        <button id="reset-btn" class="ghost">Choose a different file</button>
      </section>

      <section id="progress" class="progress hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <p id="progress-text" class="status">Loading FFmpeg…</p>
      </section>

      <section id="result" class="result hidden">
        <p class="success">Done.</p>
        <a id="download-link" class="primary" download>Download MP4</a>
      </section>

      <section id="log" class="log hidden">
        <details>
          <summary>FFmpeg log</summary>
          <pre id="log-output"></pre>
        </details>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
