<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Converter — File Converter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <nav class="topnav">
        <a href="index.html" class="brand">File Converter</a>
        <a href="video.html" class="tab">Video</a>
        <a href="audio.html" class="tab">Audio</a>
        <a href="image.html" class="tab active">Image</a>
      </nav>

      <header>
        <h1>Image</h1>
        <p class="subtitle">PNG, JPEG, WebP, GIF, BMP → PNG, JPEG, WebP</p>
      </header>

      <section id="dropzone" class="dropzone" tabindex="0">
        <input id="file-input" type="file" accept="image/*" multiple hidden />
        <div class="dropzone-content">
          <svg viewBox="0 0 24 24" width="48" height="48" aria-hidden="true">
            <path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v9.59l3.3-3.3a1 1 0 1 1 1.4 1.42l-5 5a1 1 0 0 1-1.4 0l-5-5a1 1 0 1 1 1.4-1.42L11 13.59V4a1 1 0 0 1 1-1Zm-7 15a1 1 0 0 1 1 1v1h12v-1a1 1 0 1 1 2 0v2a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1Z"/>
          </svg>
          <p><strong>Drop images here</strong></p>
          <p class="hint">or click to choose · multiple files supported</p>
        </div>
      </section>

      <section id="file-info" class="panel hidden">
        <div class="row">
          <span class="label">Files</span>
          <span id="file-count" class="value"></span>
        </div>
        <div class="row">
          <span class="label">Convert to</span>
          <select id="output-format">
            <option value="png">PNG (lossless)</option>
            <option value="jpeg" selected>JPEG</option>
            <option value="webp">WebP</option>
          </select>
        </div>
        <div class="row" id="quality-row">
          <span class="label">Quality <span id="quality-value" class="value">0.92</span></span>
          <input id="quality" type="range" min="0.1" max="1" step="0.01" value="0.92" />
        </div>
        <button id="convert-btn" class="primary" disabled>Convert</button>
        <button id="reset-btn" class="ghost">Choose different files</button>
      </section>

      <section id="progress" class="panel hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <p id="progress-text" class="status">Working…</p>
      </section>

      <section id="result" class="panel hidden">
        <p class="success">Done.</p>
        <div id="downloads"></div>
        <a id="download-all" class="primary hidden" download>Download all (.zip)</a>
      </section>
    </main>

    <script type="module" src="image.js"></script>
  </body>
</html>
